<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavanderia Online</title>
    <link rel="stylesheet" href="Style_cadastro.css">
    <link rel="shortcut icon" href="../../Images/Lavandeira.ico" type="image/x-icon">
    <link rel="stylesheet" href="Style_cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
</head>
<body>
    <div class="Conteiner">
        <div class="Conteiner-top">
            <h1 class="Nome_lav">Lavanderia On-Line</h1>
        </div>
        <input id="inp-nome"      class="Nome"      type="text"     placeholder="Nome">
        <input id="inp-sobrenome" class="Sobrenome" type="text"     placeholder="Sobrenome">
        <input id="inp-cpf"       class="CPF"       type="number"   placeholder="CPF">
        <input id="inp-email"     class="Email"     type="email"    placeholder="Email">
        <input id="inp-endereco"  class="endereco"  type="text"     placeholder="endereço">
        <input id="inp-telefone"  class="Telefone"  type="tel"      placeholder="Telefone">
        <input id="inp-senha"     class="Telefone"  type="password" placeholder="Senha">
        <span id="erro-cadastro" style="color:#c0392b;font-size:12px;font-family:'Archivo Black',sans-serif;display:none;margin-top:4px;max-width:270px;text-align:center;"></span>
        <button class="botao" id="btn-cadastrar">Cadastre-se</button>
    </div>
    
    <script src="Script_Cadastro.js"></script>
</body>
</html>
