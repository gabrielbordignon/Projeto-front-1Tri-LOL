<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</head>
<body>
 <!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Launch demo modal
</button>

<body class="p-5">
 <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPedido">
        Fazer Pedido
    </button>

    <div class="modal fade" id="modalPedido" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                
                <div class="modal-body">
                    <form id="formPedido">
                        <div id="container-pecas">
                            <!-- Primeira Linha (O botão remover começa escondido aqui) -->
                            <div class="row g-3 mb-3 align-items-end peca-item">
                                <div class="col-md-7">
                                    <label class="form-label">Peça</label>
                                    <select class="form-select" required>
                                        <option value="" selected disabled>Selecione a peça...</option>
                                        <option value="1">Peça A</option>
                                        <option value="2">Peça B</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Qtd.</label>
                                    <input type="number" class="form-control" placeholder="0" min="1" required>
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-outline-danger w-100 btn-remover" onclick="removerLinha(this)" style="display: none;">
                                        Remover
                                    </button>
                                </div>
                            </div>
                        </div>

                        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="btnAdicionar">
                            + Adicionar mais uma peça
                        </button>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="submit" form="formPedido" class="btn btn-success">Confirmar Pedido</button>
                </div>
            </div>
        </div>
    </div>

<script>        
  // Lógica para adicionar nova linha
   document.getElementById('btnAdicionar').addEventListener('click', function() {
            const container = document.getElementById('container-pecas');
            
            // Seleciona a primeira linha para servir de modelo para o clone
            const primeiraLinha = container.querySelector('.peca-item');
            const novaLinha = primeiraLinha.cloneNode(true);
            
            // Limpa os campos da nova linha
            novaLinha.querySelectorAll('input').forEach(input => input.value = '');
            novaLinha.querySelectorAll('select').forEach(select => select.selectedIndex = 0);
            
            // Mostra o botão "Remover" apenas na nova linha
            const btnRemover = novaLinha.querySelector('.btn-remover');
            btnRemover.style.display = 'block';

            container.appendChild(novaLinha);
        });

        function removerLinha(botao) {
            // Remove a linha pai do botão clicado
            botao.closest('.peca-item').remove();
        }
</script>
</body>
</html>
